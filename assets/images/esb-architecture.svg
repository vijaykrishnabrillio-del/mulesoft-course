<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#003865">ESB-Based Integration</text>
  
  <!-- Applications -->
  <circle cx="200" cy="100" r="40" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">App A</text>
  
  <circle cx="600" cy="100" r="40" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="600" y="105" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">App B</text>
  
  <circle cx="200" cy="300" r="40" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="200" y="305" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">App C</text>
  
  <circle cx="600" cy="300" r="40" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="600" y="305" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">App D</text>
  
  <!-- ESB -->
  <rect x="300" y="150" width="200" height="100" fill="#fff3e0" stroke="#ff9800" stroke-width="3" rx="10"/>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#f57c00">ESB</text>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Routing • Transform</text>
  <text x="400" y="235" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Orchestration</text>
  
  <!-- Connections -->
  <line x1="240" y1="100" x2="300" y2="175" stroke="#4caf50" stroke-width="2"/>
  <line x1="560" y1="100" x2="500" y2="175" stroke="#4caf50" stroke-width="2"/>
  <line x1="240" y1="300" x2="300" y2="225" stroke="#4caf50" stroke-width="2"/>
  <line x1="560" y1="300" x2="500" y2="225" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Benefits -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#388e3c">✓ Centralized • Loosely Coupled • Reusable</text>
</svg>
