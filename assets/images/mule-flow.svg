<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250">
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#003865">Mule Flow Structure</text>
  
  <!-- Source -->
  <rect x="50" y="80" width="150" height="120" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/>
  <text x="125" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976d2">Source</text>
  <text x="125" y="130" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">HTTP Listener</text>
  <text x="125" y="150" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">Scheduler</text>
  <text x="125" y="170" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">JMS Consumer</text>
  <text x="125" y="190" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666" font-style="italic">Triggers the flow</text>
  
  <!-- Arrow -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <line x1="200" y1="140" x2="250" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Processors -->
  <rect x="250" y="80" width="400" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="450" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#f57c00">Processors (Flow Logic)</text>
  <text x="450" y="130" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">Transform Message • Logger • Set Variable</text>
  <text x="450" y="150" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">Flow Reference • Choice Router</text>
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">Database • HTTP Request</text>
  <text x="450" y="190" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666" font-style="italic">Process, transform, enrich data</text>
  
  <!-- Arrow -->
  <line x1="650" y1="140" x2="700" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Error Handler -->
  <rect x="700" y="80" width="150" height="120" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
  <text x="775" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#7b1fa2">Response</text>
  <text x="775" y="130" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">Success</text>
  <text x="775" y="150" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">or</text>
  <text x="775" y="170" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">Error Handler</text>
  <text x="775" y="190" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666" font-style="italic">Return result</text>
  
  <!-- Flow direction label -->
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">─────────────────────── Flow Direction ───────────────────────►</text>
</svg>
