<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <!-- Title -->
  <text x="350" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#003865">Mule Event Structure</text>
  
  <!-- Main Event Box -->
  <rect x="50" y="70" width="600" height="300" fill="#f5f5f5" stroke="#333" stroke-width="3" rx="10"/>
  <text x="350" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#003865">Mule Event</text>
  
  <!-- Message Section -->
  <rect x="80" y="120" width="540" height="200" fill="white" stroke="#00a0df" stroke-width="2" rx="5"/>
  <text x="350" y="145" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#00a0df">Message</text>
  
  <!-- Payload -->
  <rect x="100" y="160" width="230" height="140" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/>
  <text x="215" y="185" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976d2">Payload</text>
  <text x="215" y="210" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">The actual data/content</text>
  <text x="215" y="235" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">• JSON</text>
  <text x="215" y="255" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">• XML</text>
  <text x="215" y="275" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">• Java Objects</text>
  
  <!-- Attributes -->
  <rect x="370" y="160" width="230" height="140" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="485" y="185" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#f57c00">Attributes</text>
  <text x="485" y="210" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#333">Metadata about message</text>
  <text x="485" y="235" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">• Headers</text>
  <text x="485" y="255" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">• Query params</text>
  <text x="485" y="275" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">• URI params</text>
  
  <!-- Variables -->
  <rect x="80" y="330" width="540" height="30" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
  <text x="350" y="350" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#7b1fa2">Variables (Optional): flowVars, sessionVars</text>
</svg>
